<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業科目自動對獎系統</title>
    <style>
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); width: 100%; max-width: 480px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        .info-box { background: #fff9db; border: 1px solid #f59f00; padding: 12px; border-radius: 8px; font-size: 14px; color: #856404; margin-bottom: 15px; line-height: 1.5; }
        .section-title { color: #d93025; background: #fff1f0; padding: 8px 12px; border-left: 5px solid #d93025; margin: 25px 0 10px 0; font-size: 15px; font-weight: bold; }
        label { font-weight: bold; color: #555; display: block; margin-top: 10px; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .q-row { display: flex; align-items: center; margin-bottom: 10px; background: #fff; padding: 5px 10px; border-radius: 8px; border: 1px solid #eee; }
        .q-num { width: 60px; font-weight: bold; color: #1a73e8; font-size: 14px; }
        .q-input { flex: 1; margin: 0 10px; border: 1px solid #ccc; height: 38px; }
        .feedback { min-width: 85px; font-weight: bold; text-align: right; font-size: 13px; }
        .correct-ans { color: #d93025; display: block; font-size: 11px; margin-top: 2px; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 20px; }
        .footer { text-align: center; color: #888; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>科目對答系統</h2>
    
    <label>選擇科目：</label>
    <select id="sub" onchange="initChapters()">
        <option value="">-- 請選擇科目 --</option>
        <option value="electronics">⚡電子學</option>
        <option value="electric">🔋基本電學</option>
    </select>

    <label>選擇章節：</label>
    <select id="chap" onchange="buildQuiz()">
        <option value="">-- 選擇章節 --</option>
    </select>

    <div id="quiz-area" style="display:none;">
        <div class="info-box">
            💡 <strong>填寫說明：</strong><br>
            1. 計算題不需要填寫單位。<br>
            2. 根號請使用 <strong>sqrt(N)</strong>，例如 √2 寫作 sqrt(2)。<br>
            3. 平方或次方請使用 <strong>^</strong>，例如 10³ 寫作 10^3。
        </div>
        <div id="quiz-box"></div>
        <button id="check-btn" onclick="checkAll()">即時核對答案</button>
    </div>

    <div class="footer">填寫完畢後點擊按鈕，僅針對已填寫格核對</div>
</div>
