<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業科目自動對獎系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #51A8DD; 
            font-family: 'Noto Sans TC', -apple-system, "Microsoft JhengHei", sans-serif; 
            padding: 20px; 
            margin: 0;
            display: flex; 
            justify-content: center; 
            position: relative; 
        }

        /* 放大 LOGO (150px) */
        .logo {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 200px; 
            height: auto;
            z-index: 10;
        }

        /* ✅ 修改 1: 貓咪圖片放大至 75% */
        .top-banner-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            justify-content: center; 
        }
        .top-banner {
            width: 80%; /* 從 60% 放大為 75% */
            height: auto;
            border-radius: 15px 15px 0 0; 
            /* ✅ 修改 2: 移除圖片下方的間距 */
            margin-bottom: 0; 
        }

        .container {
            width: 100%;
            max-width: 480px; 
            margin-top: 100px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card { 
            background: white; 
            /* ✅ 修改 3: 增加卡片上方的留白 (padding-top) */
            padding: 40px 25px 25px 25px; 
            border-radius: 0 0 15px 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            width: 100%;
            box-sizing: border-box; 
        }

        h2 { 
            color: black; 
            text-align: center; 
            margin-top: 0;
            margin-bottom: 20px; 
            border-bottom: 2px solid #ddd; 
            padding-bottom: 10px; 
        }

        .info-box { background: #fff9db; border: 1px solid #f59f00; padding: 12px; border-radius: 8px; font-size: 14px; color: #856404; margin-bottom: 15px; line-height: 1.5; }
        .section-title { color: #d93025; background: #fff1f0; padding: 8px 12px; border-left: 5px solid #d93025; margin: 25px 0 10px 0; font-size: 15px; font-weight: bold; }
        
        label { font-weight: bold; color: black; display: block; margin-top: 10px; }
        
        select, input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; font-family: inherit; color: black; }
        
        .q-row { display: flex; align-items: center; margin-bottom: 10px; background: #fff; padding: 5px 10px; border-radius: 8px; border: 1px solid #eee; scroll-margin-top: 20px; }
        .q-num { width: 60px; font-weight: bold; color: #1a73e8; font-size: 14px; }
        .q-input { flex: 1; margin: 0 10px; border: 1px solid #ccc; height: 38px; }
        .feedback { min-width: 85px; font-weight: bold; text-align: right; font-size: 13px; color: black; }
        .correct-ans { color: #d93025; display: block; font-size: 11px; margin-top: 2px; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 20px; font-family: inherit; }
        .footer { text-align: center; color: #333; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<img src="logo.png" alt="LOGO" class="logo">

<div class="container" id="main-container">
    <div class="top-banner-container">
        <img src="cat.png" alt="貓咪大圖" class="top-banner">
    </div>

    <div class="card">
        <h2>我要對答案</h2>
        
        <label>選擇科目：</label>
        <select id="sub" onchange="initChapters()">
            <option value="">-- 請選擇科目 --</option>
            <option value="electronics">⚡電子學</option>
            <option value="electric">🔋基本電學</option>
        </select>

        <label>選擇章節：</label>
        <select id="chap" onchange="buildQuiz()">
            <option value="">-- 選擇章節 --</option>
        </select>

        <div id="quiz-area" style="display:none;">
            <div class="info-box">
                💡 <strong>填寫說明：</strong><br>
                1. 計算題不需要填寫單位。<br>
                2. 根
